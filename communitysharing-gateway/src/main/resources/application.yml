server:
  port: 8081
spring:
  main:
    web-application-type: reactive
  cloud:
    gateway:
      routes: # 路由配置
          - id: auth # 路由id
            uri: lb://communitysharing-auth # 负载均衡 Spring Cloud Gateway 会使用注册中心（如 Nacos ）来解析并负载均衡到具体的服务实例。
            predicates:
              - Path=/auth/** # 匹配路径
            filters:
              - StripPrefix=1 # 移除前缀
          - id: user
            uri: lb://communitysharing-user
            predicates:
              - Path=/user/**
            filters:
              - StripPrefix=1 # 移除前缀
          - id: content
            uri: lb://communitysharing-content
            predicates:
              - Path=/sharing/**
            filters:
              - StripPrefix=1 # 移除前缀
          - id: user-relation
            uri: lb://communitysharing-user-relation
            predicates:
              - Path=/users/**
            filters:
              - StripPrefix=1 # 移除前缀
          - id: notify
            uri: lb://communitysharing-notify
            predicates:
              - Path=/notify/**
            filters:
              - StripPrefix=1
          - id: search
            uri: lb://communitysharing-search
            predicates:
                - Path=/es/**
            filters:
              - StripPrefix=1
          - id: comment
            uri: lb://communitysharing-comment
            predicates:
              - Path=/comment/**
            filters:
              - StripPrefix=1
  data:
    redis:
      database: 0
      host: localhost
      port: 6379
      password: redispass123@
      timeout: 5s # 配置超时时间
      lettuce: # 配置lettuce
        pool:
          max-active: 200
          max-idle: 20 # 配置连接池最大连接数
          min-idle: 0 # 配置连接池最小连接数
          max-wait: -1ms # 配置连接池最大等待时间

############## Sa-Token 配置 (文档: https://sa-token.cc) ##############
sa-token:
  # token 名称（同时也是 cookie 名称）
  token-name: Authorization
  # token 前缀
  token-prefix: Bearer
  # token 有效期（单位：秒） 默认30天，-1 代表永久有效
  timeout: 604800
  # token 最低活跃频率（单位：秒），如果 token 超过此时间没有访问系统就会被冻结，默认-1 代表不限制，永不冻结
  active-timeout: -1
  # 是否允许同一账号多地同时登录 （为 true 时允许一起登录, 为 false 时新登录挤掉旧登录）
  is-concurrent: false
  # 在多人登录同一账号时，是否共用一个 token （为 true 时所有登录共用一个 token, 为 false 时每次登录新建一个 token）
  is-share: true
  # token 风格（默认可取值：uuid、simple-uuid、random-32、random-64、random-128、tik）
  token-style: random-128
  # 是否输出操作日志
  is-log: true

logging:
  level:
    org.springframework.cloud.gateway: DEBUG