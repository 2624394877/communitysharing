server:
  port: 8094
spring:
  profiles:
    active: dev

mybatis:
  mapper-locations: classpath:/mapper/*.xml # 配置mybatis的xml文件位置 (classpath:/mapper/*.xml)表示扫描classpath下的mapper目录下的所有xml文件

retry:
  max-attempts: 3 # 最大重试次数
  init-interval: 1000 # 初始延迟时间，单位 ms
  multiplier: 2 # 每次重试间隔加倍（每次乘以 2）

mq-consumer:
  comment:
    rate-limit: 1000