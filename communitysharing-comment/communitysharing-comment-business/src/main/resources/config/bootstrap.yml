spring:
  application:
    name: communitysharing-comment # 应用名称
  profiles:
    active: dev # 默认激活 dev 本地开发环境
  cloud:
    nacos:
      config: # Nacos 配置中心
        server-addr: http://127.0.0.1:8848 # 指定 Nacos 配置中心的服务器地址
        prefix: ${spring.application.name} # 配置 Data Id 前缀，这里使用应用名称作为前缀
        group: DEFAULT_GROUP # 所属组
        namespace: 2e254952-9803-4eae-8771-b086042c797f # 命名空间
        file-extension: yaml # 配置文件格式
        refresh-enabled: true # 是否开启动态刷新
      discovery: # Nacos 服务注册发现
        enabled: true # 是否启用 Nacos 服务注册发现
        server-addr: http://127.0.0.1:8848
        namespace: 2e254952-9803-4eae-8771-b086042c797f
        group: DEFAULT_GROUP